# Story: US-001 — Customer Self-Registration
# NorthBank Registration Service — application configuration

spring:
  application:
    name: northbank-registration

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.northbank: DEBUG
    org.springframework.security: WARN

# ── JWT (ADR-002, Story: US-002 / ADR-003, Story: US-003) ───────────────────
# secret MUST be supplied via SECURITY_JWT_SECRET env var (min 32 ASCII chars).
security:
  jwt:
    secret: ${SECURITY_JWT_SECRET}
    session-token-expiry-minutes: 5
    access-token-expiry-minutes: 15

northbank:
  demo:
    seed-enabled: ${NORTHBANK_DEMO_SEED_ENABLED:true}
